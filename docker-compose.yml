services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-seolab}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-seolab}
      POSTGRES_DB: ${POSTGRES_DB:-seolab}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-seolab} -d ${POSTGRES_DB:-seolab}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [seolab]

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [seolab]

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_URL: postgresql://${POSTGRES_USER:-seolab}:${POSTGRES_PASSWORD:-seolab}@db:5432/${POSTGRES_DB:-seolab}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["./entrypoint.sh"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/api/health').status==200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks: [seolab]

  worker:
    build:
      context: ./backend
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_URL: postgresql://${POSTGRES_USER:-seolab}:${POSTGRES_PASSWORD:-seolab}@db:5432/${POSTGRES_DB:-seolab}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      backend:
        condition: service_healthy
    command: ["celery", "-A", "workers.celery_app.celery", "worker", "--loglevel=INFO", "--concurrency=4"]
    networks: [seolab]

  beat:
    build:
      context: ./backend
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_URL: postgresql://${POSTGRES_USER:-seolab}:${POSTGRES_PASSWORD:-seolab}@db:5432/${POSTGRES_DB:-seolab}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      backend:
        condition: service_healthy
    command: ["celery", "-A", "workers.celery_app.celery", "beat", "--loglevel=INFO"]
    networks: [seolab]

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: /api
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
    depends_on:
      - backend
    networks: [seolab]

volumes:
  pgdata:
  redisdata:

networks:
  seolab:
    driver: bridge
